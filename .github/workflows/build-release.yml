name: Build and Release
on:
  push:
    branches:
      - main
      - next
      - next-major
      - alpha
      - beta
      - '[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - main
      - next
      - next-major
      - alpha
      - beta

# Least privilege by default; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Verify
    steps:
    - name: Verify build and tests
      uses: Hexalith/Hexalith.Builds/Github/verify@06c0aaaae4c373ba8042a42fe7f0c2ea22eeb7cb
      with:
        project-name: ${{ github.event.repository.name }}

  release:
    runs-on: ubuntu-latest
    name: Release
    needs: verify
    if: github.event_name == 'push'
    permissions:
      contents: write        # commit changelog, push tag, create GitHub release
      issues: write          # semantic-release comments on released issues
      pull-requests: write   # semantic-release comments on released PRs
      packages: write        # push pre-release packages to GitHub Packages
    steps:
    - name: Build and publish packages
      uses: Hexalith/Hexalith.Builds/Github/package-release@e3be295557d7d7d6009ea2dc207084b20384e740
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
